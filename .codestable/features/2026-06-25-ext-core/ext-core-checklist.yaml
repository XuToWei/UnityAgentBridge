feature: 2026-06-25-ext-core
created: 2026-06-25

steps:
  - action: "名词模型+错误码:ExtensionManifest(extension.json)/InstalledMeta(.agentbridge-meta.json)/ExtensionErrorCodes(MANIFEST_MISSING/MANIFEST_INVALID/ID_CONFLICT/COMMAND_CONFLICT/DOWNLOAD_FAILED/IO_FAILED)/InstallResult/InstalledExtension"
    exit_signal: "类型编译通过,JSON 序列化/反序列化往返手测 OK"
    status: done
  - action: "安装器拉取+校验:HttpClient 下 GitHub archive zip + 解压临时目录 + 读 sourceDir/extension.json + 字段/id 格式/命令冲突(交叉 CommandRegistry)校验(尚不落 Assets)"
    exit_signal: "合法 URL 拿到 manifest;缺 manifest/非法字段/撞命令 各自报对应错误码"
    status: done
  - action: "安装器落地+卸载:拷 sourceDir→Assets/AgentBridgeExtensions/{id}/ + 写 .agentbridge-meta.json + AssetDatabase.Refresh;失败清理半截目录(IO_FAILED);Uninstall 删目录+Refresh"
    exit_signal: "真机装示例扩展源码进 Assets、Refresh 后命令出现在 list_commands;卸载复原"
    status: done
  - action: "本地扫描:LocalRegistry.Scan 扫 Assets/AgentBridgeExtensions/* 读 manifest+meta,交叉 CommandRegistry.Commands 标 Compiled"
    exit_signal: "Scan 返回已装项,Compiled 与实际注册状态一致"
    status: done
  - action: "最小窗口:ExtensionManagerWindow([MenuItem Tools/AgentBridge/Extensions])列已装(id/name/version/enabled/compiled)+ 粘 URL 安装 + 逐项卸载;无启停/远程/搜索"
    exit_signal: "窗口装/卸一个扩展走通;第 3 节验收场景有证据"
    status: done

checks:
  - item: "安装成功:合法 GitHub URL → 源码进 Assets/AgentBridgeExtensions/{id}/、写 meta、Refresh 触发,InstallResult.Ok=true"
    source: 验收场景
    status: passed
  - item: "manifest 缺失(仓库/ sourceDir 下无 extension.json)→ MANIFEST_MISSING"
    source: 验收场景
    status: passed
  - item: "manifest 非法(id 格式错/缺必填字段)→ MANIFEST_INVALID"
    source: 验收场景
    status: passed
  - item: "id 冲突(目录已存在)→ ID_CONFLICT,不覆盖"
    source: 验收场景
    status: passed
  - item: "命令冲突(manifest.commands 撞 CommandRegistry 已注册,如 ping)→ COMMAND_CONFLICT,不落地"
    source: 验收场景
    status: passed
  - item: "下载失败(404/网络错)→ DOWNLOAD_FAILED"
    source: 验收场景
    status: passed
  - item: "卸载:Uninstall(id) → 目录删+Refresh 返回 true;不存在 id → false"
    source: 验收场景
    status: passed
  - item: "本地扫描:Scan() 列已装项,Compiled 与 CommandRegistry 实际注册一致"
    source: 验收场景
    status: passed
  - item: "窗口闭环:粘 URL 安装出现在列表、逐项卸载消失"
    source: 验收场景
    status: passed
