    source: 流程级约束
    status: passed
  - item: "冲突预检前置:拷文件前完成 id/命令检查,失败不留半截目录"
    source: 流程级约束
    status: passed
  - item: "安装目标限 Assets/AgentBridgeExtensions/ 下;id 格式校验(小写字母/数字/连字符);拒路径穿越"
