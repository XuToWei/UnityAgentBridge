feature: 2026-06-26-command-test-suite
created: 2026-06-26

steps:
  - action: "脚手架:Unity/Tests/Editor/ + AgentBridge.Editor.Tests.asmdef(Editor-only,引用 AgentBridge.Editor+UnityEngine/UnityEditor.TestRunner+nunit,defineConstraints UNITY_INCLUDE_TESTS)+ BridgeTestBase(临时场景/资产/root + host 重指向 + WaitForResponse 协程 + setup-teardown 清理)+ __TestCommands(__test_echo)"
    exit_signal: "一个 sanity [Test](Dispatch ping→pong)结构成立、可被 Test Runner 发现;Unity/Editor/ 无生产改动"
    status: done
  - action: "AI↔Unity 往返(RoundTripTests,真实 update):[SetUp]设临时root+Poll=0+Host.Stop/Start;[UnityTest]写 request 文件→yield WaitForResponse→读 response 断言;覆盖 ok/坏JSON(INTERNAL_ERROR)/未知命令(UNKNOWN_COMMAND)/单次认领/孤儿INTERRUPTED(预置processing→ReclaimOrphans)/原子写;[TearDown]还原host"
    exit_signal: "往返响应文件 status/result/error.code/commandsVersion 正确;真实 update→Tick 路径跑通;TearDown 还原 host 回真实 root"
    status: done
  - action: "file-bridge 框架(DispatchTests):注册/重复拒绝/Version 确定性+增删稳定/未知命令/缺command(INVALID_PARAMS)/handler异常(HANDLER_EXCEPTION)/CommandException→code/禁用(COMMAND_DISABLED)/list_commands 剔除禁用+version 随禁用变"
    exit_signal: "框架各错误码与 version 行为有断言覆盖"
    status: done
  - action: "inspection(InspectionCommandTests):临时场景建对象→get_hierarchy(树/maxDepth/root)/get_object(path+instanceId+componentTypes+引用渲染)/get_selection(选中+空[])/list_assets(filter+无filter截断);错误 OBJECT/COMPONENT/INVALID_OBJECT_REF"
    exit_signal: "4 只读命令正常+边界+错误有断言"
    status: done
  - action: "mutation(MutationCommandTests):set_property(嵌套+PROPERTY_TYPE_MISMATCH+PROPERTY_NOT_FOUND+dirty)/create_object(empty/primitive/prefab/parent+ObjectRef)/delete_object(删+重复OBJECT_NOT_FOUND)/invoke_menu(已知+未知MENU_NOT_FOUND)"
    exit_signal: "4 写命令正常+边界+错误有断言;场景 dirty 验证"
    status: done
  - action: "assets(AssetCommandTests):create_asset(folder/text/SO+UNKNOWN_ASSET_TYPE)/import_asset(临时磁盘源→Assets+ASSET_SOURCE_NOT_FOUND)/move/delete(回收站+ASSET_NOT_FOUND)/refresh/路径越界INVALID_ASSET_PATH;临时资产清理"
    exit_signal: "5 资源命令+路径守卫有断言;临时资产 TearDown 清干净"
    status: done
  - action: "命令管理器+共享层(CommandManagerTests/SceneInfraTests):CommandToggle(EditorPrefs往返+SetEnabled影响CommandRegistry+Reapply)/CommandCatalog(列举+来源+Enabled+归属)/LocalRegistry(扫临时扩展)/SceneObjectResolver/PropertySerializer/PropertyDeserializer;EditorPrefs复原"
    exit_signal: "管理器+共享层有断言;动过的 EditorPrefs TearDown 复原"
    status: done

