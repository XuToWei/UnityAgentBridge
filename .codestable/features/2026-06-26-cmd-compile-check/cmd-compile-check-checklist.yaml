feature: 2026-06-26-cmd-compile-check
created: 2026-06-26

steps:
  - action: "收集器 + DTO:CompileMessage{file,line,column,message,type} + CompileResult{compiling,compiledAt,errorCount,warningCount,messages[]} + CompileMonitor([InitializeOnLoad] 订阅 CompilationPipeline.compilationStarted=清空+compiling=true / assemblyCompilationFinished=逐程序集追加 CompilerMessage→CompileMessage / compilationFinished=compiling=false+盖compiledAt;读写 SessionState 键 AgentBridge.CompileResult);GF 风格"
    exit_signal: "编辑器手动改脚本触发编译后,SessionState 里能读到结果 JSON(开发期 Debug 验证);CompileMonitor 跨 reload 重订阅"
    status: done
  - action: "命令层:RecompileHandler(recompile→CompilationPipeline.RequestScriptCompilation(),立即返回 {requested:true},reload 前写出)+ GetCompileResultHandler(get_compile_result→读 SessionState,按 type 把 messages 拆 errors[]/warnings[],返回 {compiling,compiledAt,errorCount,warningCount,errors,warnings});落 Commands/Compilation/;实现 ICommandHandler(Command/Description/Execute/GetParamsSchema)"
    exit_signal: "list_commands 含 recompile+get_compile_result;get_compile_result 经 Dispatch 返回结果体结构正确(errors/warnings 分数组)"
    status: done
  - action: "测试:EditMode 单测 CompileMonitor 的 CompilerMessage→CompileMessage 映射 + get_compile_result 读预置 SessionState(覆盖 errors/warnings 拆分、尚无编译空态、compiling 态);真实编译闭环走活体验证(D6 边界,不在 EditMode 驱动 reload)"
    exit_signal: "EditMode 单测绿(映射 + 读预置态);活体写错码→recompile→get_compile_result 读到 error 通过"
    status: done

