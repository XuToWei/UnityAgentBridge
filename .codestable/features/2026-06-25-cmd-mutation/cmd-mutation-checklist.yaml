feature: 2026-06-25-cmd-mutation
created: 2026-06-25

steps:
  - action: "写值基础设施:PropertyDeserializer(JSON→SerializedProperty 类型映射 + objectReference 解析,PropertySerializer 对偶)+ MutationErrorCodes(PROPERTY_NOT_FOUND/PROPERTY_TYPE_MISMATCH/MENU_NOT_FOUND/CREATE_FAILED)"
    exit_signal: "手测写 Transform 某属性成功、类型不符抛 PROPERTY_TYPE_MISMATCH"
    status: done
  - action: "set_property:ResolveComponent → Undo.RecordObject → SerializedObject.FindProperty(嵌套路径)→ PropertyDeserializer 写值 → ApplyModifiedProperties → MarkSceneDirty/SetDirty"
    exit_signal: "真机改组件属性、场景变 dirty、Ctrl-Z 可撤销"
    status: done
  - action: "create_object + delete_object:empty/primitive(ObjectFactory)/prefab(PrefabUtility.InstantiatePrefab)创建 + RegisterCreatedObjectUndo;删除走 Undo.DestroyObjectImmediate;均 MarkSceneDirty;create 返回新对象 ObjectRef"
    exit_signal: "真机建/删对象、dirty、可撤销;prefab 无效路径 → CREATE_FAILED;重复删 → OBJECT_NOT_FOUND"
    status: done
  - action: "invoke_menu:EditorApplication.ExecuteMenuItem(path) → bool;false → MENU_NOT_FOUND(逃生舱,不受 dirty/save 纪律约束)"
    exit_signal: "真机执行已知菜单项返回 executed:true、未知项 MENU_NOT_FOUND"
    status: done
  - action: "自描述 + 端到端边界:4 handler 加 [Command] 描述 + ICommandSchema;list_commands 见 4 命令带 schema;边界(not found/类型不符/菜单失败/prefab 路径无效)"
    exit_signal: "第 3 节验收场景有证据"
    status: done

