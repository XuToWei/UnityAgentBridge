feature: 2026-06-25-cmd-assets
created: 2026-06-25

steps:
  - action: "资源基础设施:AssetErrorCodes(INVALID_ASSET_PATH/ASSET_SOURCE_NOT_FOUND/ASSET_NOT_FOUND/ASSET_CREATE_FAILED/ASSET_MOVE_FAILED/UNKNOWN_ASSET_TYPE)+ 写路径守卫(限 Assets/ 下)+ SO 类型名解析(ScriptableObject 子类)"
    exit_signal: "手测越界路径抛 INVALID_ASSET_PATH、未知 SO 类型抛 UNKNOWN_ASSET_TYPE"
    status: done
  - action: "create_asset + delete_asset:folder(CreateFolder)/text(WriteAllText+ImportAsset)/scriptableObject(CreateInstance+CreateAsset+SaveAssets)三 kind;删除走 MoveAssetToTrash"
    exit_signal: "真机建文件夹/文本/SO、删到回收站;无效 kind/未知类型报错"
    status: done
  - action: "import_asset + move_asset:外部文件 File.Copy→ImportAsset(返回 path+guid+type);MoveAsset 移动/改名(非空错误串→ASSET_MOVE_FAILED)"
    exit_signal: "真机导入外部文件、移动/改名;source 缺→ASSET_SOURCE_NOT_FOUND、移动失败→ASSET_MOVE_FAILED"
    status: done
  - action: "refresh:AssetDatabase.Refresh"
    exit_signal: "真机调返回 refreshed:true"
    status: done
  - action: "自描述 + 端到端边界:5 handler 加 [Command] 描述 + ICommandSchema;list_commands 见 5 命令带 schema;边界(越界路径/source 缺/未知类型/移动失败/删不存在)"
    exit_signal: "第 3 节验收场景有证据"
    status: done

checks:
