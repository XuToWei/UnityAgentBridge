feature: 2026-06-25-ext-enable-disable
created: 2026-06-25

steps:
  - action: "file-bridge 禁用名单底座:ErrorCodes.CommandDisabled(COMMAND_DISABLED)+ CommandRegistry.SetDisabledCommands/IsDisabled + GetAll/Version 改按可见集(剔除禁用)+ CommandDispatcher 禁用分支(IsDisabled→COMMAND_DISABLED)"
    exit_signal: "设入禁用名单后 list_commands 不列该命令、commandsVersion 变、dispatch 调到返 COMMAND_DISABLED;TryGet 仍找得到 handler"
    status: done
  - action: "ExtensionState + meta 命令级字段:InstalledMeta 加 DisabledCommands;SetEnabled(扩展级 meta.enabled)+ SetCommandEnabled(命令级 meta.disabledCommands)改 meta+重算名单(D1 算法:enabled=false→全部命令,否则→disabledCommands,并集)+设入;Reapply 扫 meta 重建"
    exit_signal: "SetEnabled(id,false) 禁整扩展、SetCommandEnabled(id,cmd,false) 只禁单条;Reapply 从 meta 正确重建并集"
    status: done
  - action: "域重载重应用:[InitializeOnLoad] 钩子加载后调 ExtensionState.Reapply()"
    exit_signal: "禁用(任一粒度)后触发重编译/重载 → 重载后禁用状态仍生效"
    status: done
  - action: "窗口启停 UI:ExtensionManagerWindow 每扩展行加扩展级启停 + 可展开逐命令启停,调 SetEnabled/SetCommandEnabled+刷新;不删 ext-core 远程死代码(留单独 cs-refactor)"
    exit_signal: "窗口扩展级/命令级禁用启用,列表状态与 list_commands 一致;第 3 节验收场景有证据"
    status: done

checks:
  - item: "扩展级禁用:SetEnabled(id,false) → 该扩展全部 commands 不在 list_commands;commandsVersion 变"
    source: 验收场景
    status: passed
  - item: "命令级禁用:SetCommandEnabled(id,cmd,false)(扩展仍 enabled)→ 仅 cmd 消失,同扩展其它命令仍在;commandsVersion 变"
    source: 验收场景
    status: passed
  - item: "禁用拒调:被禁命令(任一粒度)经桥接调 → error.code=COMMAND_DISABLED,handler 不执行"
    source: 验收场景
    status: passed
  - item: "启用恢复:SetEnabled/SetCommandEnabled 置 true → 命令重现 list_commands、commandsVersion 再变、可正常调用"
    source: 验收场景
    status: passed
  - item: "优先级:扩展级 enabled=false 整扩展禁用(与 disabledCommands 无关);启用扩展后 disabledCommands 恢复生效"
    source: 验收场景
    status: passed
  - item: "持久+重应用:禁用后 domain reload/重开编辑器 → 重载后禁用状态(扩展级+命令级)仍生效"
    source: 验收场景
    status: passed
  - item: "真相源:meta(enabled+disabledCommands)与实际禁用一致;手动改 meta 后 Reapply 纠正名单"
    source: 验收场景
    status: passed
  - item: "窗口:每扩展行扩展级启停+可展开逐命令启停,点击后列表状态+list_commands 同步"
    source: 验收场景
